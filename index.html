<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEEKLY TASK 08 - TO DO LIST</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="cyber-container">
      <header>
        <h1 class="glitch" data-text="TO DO LIST">TO DO LIST</h1>
        <div class="status-bar">SYSTEM STATUS: OPERATIONAL</div>
      </header>

      <div class="input-wrapper">
        <input type="text" id="taskInput" placeholder="> ENTER TASK" />
        <button id="addTask">INSTALL</button>
      </div>

      <div class="list-wrapper">
        <ul id="taskList"></ul>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
